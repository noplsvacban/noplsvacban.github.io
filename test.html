<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Game Q&A</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpg" href="images/authorplaceholder.jpg">
    <link rel="stylesheet" href="css/test.css">
    <script src="js/rerouter.js"></script>
    <script src="js/test.js"></script>
  </head>
  <body>
    <h1>Game Q&A</h1>
    <form id="qa-form">
      
      <label for="email">What's your email address? (optional)</label>
      <input type="email" id="email"><br>

      <label for="discord">What's your Discord username? (optional)</label>
      <input type="text" id="discord"><br>
      
      <label for="name">What's your name?</label>
      <input type="text" id="name" required><br>

      <label for="age">How old are you?</label>
      <input type="number" id="age" required><br>

      <label for="fav-game">What's your favorite game?</label>
      <input type="text" id="fav-game" required><br>

      <label for="platform">What platform do you play on?</label>
      <select id="platform" required>
        <option value="">--Please select--</option>
        <option value="pc">PC</option>
        <option value="console">Console</option>
        <option value="mobile">Mobile</option>
        <option value="other">Other</option>
      </select><br>

      <div id="other-platform-div" style="display: none;">
        <label for="other-platform">Please specify:</label>
        <input type="text" id="other-platform">
      </div>

      <label for="question">What's your question?</label>
      <textarea id="question" required></textarea><br>

      <button type="submit">Send</button>
    </form>
  </body>
</html>
